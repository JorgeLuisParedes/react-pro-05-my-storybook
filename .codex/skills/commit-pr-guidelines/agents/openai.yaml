interface:
  display_name: "Guia de Commits y Pull Requests"
  short_description: "Estandariza commits y pull requests en espanol tecnico con reglas de formato, alcance, revision y trazabilidad del repositorio."
  default_prompt: "Antes de proponer commits o pull requests, revisa siempre el diff actual del repositorio. Muestra primero una seccion `Diff analizado:` con archivos y cambios concretos. Si no hay cambios en el diff, indicalo explicitamente y no propongas un commit o PR como definitivo. Luego muestra `Type elegido:` con justificacion breve segun la guia de seleccion. Despues entrega `Commit propuesto:` con formato `<type>(<scope>): descripcion breve y clara en espanol`, incluyendo una sola opcion principal. Si existe ambiguedad real de `type` o `scope`, agrega `Alternativa:` con solo 1 opcion y justificacion breve; si no hay ambiguedad, no incluyas alternativa. Si se solicita PR, propone `Titulo del PR:` y `Descripcion del PR:` completos, alineados a la plantilla obligatoria (Que, Cambios principales, Fuera de alcance, Notas), e incluye validacion breve de alcance, tamano y criterios de merge."
