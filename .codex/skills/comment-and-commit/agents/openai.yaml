interface:
  display_name: "Orquestacion de Comentarios y Commit"
  short_description: "Orquesta, sobre el diff actual, la fase de comentarios y la propuesta final de commit en orden obligatorio."
  default_prompt: "Ejecuta el flujo completo sobre el diff actual del repositorio. Muestra primero `Diff analizado:` con archivos y cambios concretos. Luego aplica, solo sobre archivos del diff, acciones de comentarios alineadas con la guia (`agregar`, `ajustar` o `eliminar` comentarios obsoletos) y reporta `Comentarios aplicados:` por archivo; si no corresponde cambiar comentarios, indica `Sin cambios de comentarios` con justificacion breve. Despues selecciona `type` y `scope` segun la guia de commits y muestra `Type elegido:` con motivo breve. Finalmente entrega `Commit propuesto:` con una unica opcion en formato `<type>(<scope>): descripcion breve y clara en espanol`. Incluye `Alternativa:` solo si existe ambiguedad real de `type` o `scope`; si no hay ambiguedad, no la incluyas. Si no hay diff (ni staged ni unstaged), indicalo explicitamente y no propongas cambios de comentarios ni commit definitivo. En caso de duda o conflicto, prioriza `workflow.md` para el orden del flujo y las referencias especificas para reglas de cada fase."
